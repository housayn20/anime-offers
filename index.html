<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Store - كوبون خصم إيتاشي</title>
    
    <style>
        body { margin: 0; padding: 0; background: #0b0b0b; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .main-wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; width: 100%; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        .container { background: #151515; padding: 40px; border-radius: 20px; border-top: 5px solid #ff0000; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 10px 40px rgba(255, 0, 0, 0.4); border: 1px solid #333; }
        .logo { width: 120px; height: 120px; background: url('https://i.ibb.co/v3m8VqP/itachi.png') no-repeat center; background-size: contain; margin: 0 auto 20px; filter: drop-shadow(0 0 10px #ff0000); }
        h1 { font-size: 26px; margin-bottom: 10px; color: #ff0000; text-transform: uppercase; }
        .promo-box { background: #222; border: 1px dashed #ff0000; padding: 10px; margin: 15px 0; border-radius: 8px; color: #00ff00; font-weight: bold; font-size: 22px; }
        p { color: #ccc; line-height: 1.6; margin-bottom: 25px; font-size: 16px; }
        .btn { background: #ff0000; color: #fff; border: none; padding: 18px 30px; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; box-shadow: 0 5px 20px rgba(255, 0, 0, 0.4); }
        .btn:hover { background: #cc0000; transform: scale(1.05); }
        .footer-text { margin-top: 25px; font-size: 11px; color: #444; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="container">
            <div class="logo"></div>
            <h1>هديتك جاهزة! 🎁</h1>
            <p>لقد حصلت على كود خصم بقيمة <b>10$</b> لتيشيرت إيتاشي الجديد. الكود الخاص بك هو:</p>
            
            <div class="promo-box">ITACHI-OFF-2026</div>
            
            <p>لتفعيل هذا الكود، اضغط على الزر واضغط <b>"Allow/سماح"</b> في النافذة التي ستظهر لك الآن.</p>
            
            <button class="btn" onclick="goToOffer()">تفعيل الخصم الآن</button>
            
            <div class="footer-text">© 2026 ANIME CLOTHING STORE INC.</div>
        </div>
    </div>

    <script>
        function goToOffer() {
            // الرابط المباشر ديالك من ProPush
            var myDirectLink = "https://rm358.com/4/10716361?var=github_page";
            
            // تنبيه للزائر
            alert("⚠️ تنبيه: اضغط على 'Allow' أو 'سماح' لتفعيل الكود بنجاح!");
            
            // التحويل للرابط
            window.location.href = myDirectLink;
        }
    </script>

</body>
</html>
